services:
  - type: web
    name: ibn-mandour-api
    env: node
    buildCommand: npm install && npx prisma generate && npx next build
    startCommand: npx prisma db push && npx next start -p $PORT
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MASSAR_CLIENT_ID
        sync: false
      - key: MASSAR_CLIENT_SECRET
        sync: false
      - key: MASSAR_ISSUER
        sync: false
